<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Nova — Denní menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #fff4e6;
    --bg-2: #ffe0c0;
    --bg-3: #ffd1a0;
    --window: #fffbf3;
    --window-edge: #f5e9d4;
    --ink: #2d1f1a;
    --ink-soft: #5a4540;
    --muted: #9a8478;
    --line: #f0e3cf;
    --coral: #ff7e5f;
    --coral-deep: #e8553a;
    --pistachio: #8fb069;
    --pistachio-deep: #6a8a48;
    --sun: #f9c846;
    --sun-deep: #d9a52f;
    --berry: #c44d6c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    color: var(--ink);
  }
  body {
    font-family: 'Quicksand', -apple-system, sans-serif;
    font-weight: 500;
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
  }

  /* ========== BACKGROUND DECORATIONS ========== */
  .bg-decor {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .bg-icon {
    position: absolute;
    opacity: 0.18;
    will-change: transform;
  }
  .bg-icon.s1 { top: 6%; left: 4%; width: 70px; animation: float 9s ease-in-out infinite; }
  .bg-icon.s2 { top: 12%; right: 6%; width: 90px; animation: floatRev 11s ease-in-out infinite 0.5s; }
  .bg-icon.s3 { bottom: 8%; left: 8%; width: 80px; animation: float 10s ease-in-out infinite 1s; }
  .bg-icon.s4 { bottom: 14%; right: 4%; width: 100px; animation: floatRev 12s ease-in-out infinite 0.3s; }
  .bg-icon.s5 { top: 45%; left: 2%; width: 60px; animation: floatRev 8s ease-in-out infinite 0.8s; }
  .bg-icon.s6 { top: 50%; right: 2%; width: 70px; animation: float 9s ease-in-out infinite 1.5s; }
  .bg-icon.s7 { top: 28%; left: 12%; width: 50px; animation: float 7s ease-in-out infinite 0.2s; }
  .bg-icon.s8 { bottom: 32%; right: 14%; width: 55px; animation: floatRev 10s ease-in-out infinite 1.2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-18px) rotate(8deg); }
  }
  @keyframes floatRev {
    0%, 100% { transform: translateY(0) rotate(6deg); }
    50% { transform: translateY(-22px) rotate(-7deg); }
  }
  @keyframes windowIn {
    from { opacity: 0; transform: scale(0.92) translateY(24px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideLeft {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pop {
    0% { opacity: 0; transform: scale(0.6); }
    60% { transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  /* ========== WINDOW ========== */
  .window {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    max-width: 1500px;
    max-height: 940px;
    min-height: 0;
    background: var(--window);
    border-radius: 32px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 40px 80px -20px rgba(70, 40, 20, 0.4),
      0 0 0 1px rgba(232, 85, 58, 0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: windowIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .window::before {
    content: "";
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    bottom: 14px;
    border-radius: 22px;
    border: 1.5px dashed rgba(232, 85, 58, 0.22);
    pointer-events: none;
    z-index: 0;
  }

  /* ========== HEADER ========== */
  .window-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px 18px;
    border-bottom: 1.5px dashed var(--line);
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-logo {
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--coral), var(--berry));
    border-radius: 16px;
    color: white;
    box-shadow: 0 8px 20px -4px rgba(232, 85, 58, 0.5);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    animation-delay: 0.2s;
  }
  .brand-logo svg { width: 28px; height: 28px; }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 32px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--coral-deep);
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 5px;
  }
  .meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .week-pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(135deg, var(--coral), var(--coral-deep));
    color: white;
    padding: 9px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    box-shadow: 0 6px 16px -3px rgba(232, 85, 58, 0.45);
  }
  .week-pill svg { width: 16px; height: 16px; }
  .updated {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 600;
  }

  /* ========== TABS ========== */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 16px 32px;
    border-bottom: 1.5px dashed var(--line);
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }
  .tab {
    flex: 1 1 0;
    min-width: 0;
    background: transparent;
    border: none;
    border-radius: 14px;
    padding: 12px 6px;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: var(--ink-soft);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    animation: fadeUp 0.4s ease-out both;
    animation-delay: calc(var(--i, 0) * 0.045s + 0.25s);
  }
  .tab:hover {
    background: rgba(255, 126, 95, 0.1);
    transform: translateY(-2px);
  }
  .tab.active {
    background: linear-gradient(135deg, var(--coral), var(--coral-deep));
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 10px 22px -6px rgba(232, 85, 58, 0.55);
  }
  .tab.is-today:not(.active)::after {
    content: "";
    position: absolute;
    top: 8px;
    right: 10px;
    width: 8px;
    height: 8px;
    background: var(--sun);
    border-radius: 50%;
    box-shadow: 0 0 0 2px white, 0 0 10px var(--sun);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }
  .tab-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1;
  }
  .tab-date {
    font-size: 11px;
    opacity: 0.75;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  /* ========== BODY ========== */
  .body {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
    z-index: 2;
  }
  .today {
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .weekly {
    background: linear-gradient(165deg, #2d1f1a 0%, #1a0f0c 100%);
    color: #f8e9d2;
    padding: 22px 26px;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .weekly::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 18px;
    border: 1.5px dashed rgba(249, 200, 70, 0.2);
    pointer-events: none;
  }
  .weekly-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--sun);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .weekly-title svg { width: 24px; height: 24px; animation: wiggle 4s ease-in-out infinite; }
  .weekly-sub {
    text-align: center;
    color: rgba(248, 233, 210, 0.65);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .weekly-cats {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    overflow: hidden;
  }

  /* ========== SECTIONS (TODAY) ========== */
  .today {
    gap: 14px;
  }
  .section {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.5s ease-out both;
    animation-delay: calc(var(--i, 0) * 0.08s + 0.4s);
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .section-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    flex-shrink: 0;
    color: white;
    box-shadow: 0 4px 10px -3px rgba(0,0,0,0.2);
  }
  .section-icon.polevka { background: linear-gradient(135deg, #ff9a76, #e8553a); }
  .section-icon.local   { background: linear-gradient(135deg, #ffaa3a, #d97a1f); }
  .section-icon.ethnic  { background: linear-gradient(135deg, #b97aff, #6f3aa8); }
  .section-icon.vege    { background: linear-gradient(135deg, #b5d77f, #6a8a48); }
  .section-icon svg { width: 20px; height: 20px; }
  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: -0.01em;
    flex: 1;
  }
  .section-count {
    font-size: 10px;
    color: var(--muted);
    background: var(--line);
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .items {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    min-height: 0;
  }

  .item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
    transition: background 0.2s;
  }
  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(255, 126, 95, 0.04); }
  .item .name {
    flex: 1;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.35;
    font-weight: 500;
  }
  .item .name strong {
    font-weight: 700;
    color: var(--ink);
  }
  .item .name .gram {
    display: inline-block;
    color: var(--coral-deep);
    font-weight: 700;
    font-size: 12px;
    margin-right: 6px;
    background: rgba(232, 85, 58, 0.08);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .item .name .all {
    color: var(--muted);
    font-size: 10px;
    margin-left: 4px;
    font-weight: 500;
  }
  .item .price {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    color: var(--coral-deep);
    white-space: nowrap;
    font-size: 17px;
  }

  /* ========== WEEKLY (right pane) ========== */
  .weekly .cat {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    animation: slideLeft 0.5s ease-out both;
    animation-delay: calc(var(--i, 0) * 0.07s + 0.5s);
  }
  .weekly .cat h4 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--sun);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 1px dashed rgba(249, 200, 70, 0.3);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .weekly .cat-items {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    min-height: 0;
  }
  .weekly .item {
    border-bottom-color: rgba(249, 200, 70, 0.12);
    padding: 3px 0;
    background: transparent !important;
  }
  .weekly .item .name { color: rgba(248, 233, 210, 0.85); font-size: 12px; line-height: 1.3; }
  .weekly .item .name strong { color: #fff5e0; }
  .weekly .item .name .gram {
    color: var(--sun);
    font-weight: 700;
    background: rgba(249, 200, 70, 0.12);
    font-size: 10px;
  }
  .weekly .item .name .all { color: rgba(248, 233, 210, 0.5); }
  .weekly .item .price { color: var(--sun); font-size: 14px; }

  /* ========== FOOTER ========== */
  .window-footer {
    flex-shrink: 0;
    padding: 12px 36px;
    border-top: 1.5px dashed var(--line);
    text-align: center;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: rgba(255, 244, 230, 0.4);
    position: relative;
    z-index: 2;
    font-weight: 600;
  }
  .window-footer a {
    color: var(--coral-deep);
    text-decoration: none;
    font-weight: 700;
  }
  .window-footer a:hover { text-decoration: underline; }
  .sep { margin: 0 8px; opacity: 0.4; }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 1100px) {
    .body { grid-template-columns: 1fr 360px; }
    .today { padding: 22px 26px; }
  }
  @media (max-width: 900px) {
    .body { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .weekly { max-height: 35%; }
    .weekly-cats { flex-direction: row; gap: 16px; overflow-x: auto; }
    .weekly .cat { min-width: 200px; }
  }
  @media (max-width: 700px) {
    body { padding: 6px; }
    .window { border-radius: 20px; }
    .window-header { padding: 14px 18px 10px; flex-wrap: wrap; gap: 10px; }
    .brand-name { font-size: 24px; }
    .meta { text-align: left; }
    .tabs { padding: 8px 14px; gap: 2px; }
    .tab { padding: 8px 4px; }
    .tab-name { font-size: 14px; }
    .tab-date { font-size: 10px; }
    .today { padding: 16px 18px; }
    .weekly { padding: 16px 18px; }
  }
</style>
</head>

window.addEventListener("error", e => {

});
window.addEventListener("unhandledrejection", e => {

});

function App() {
  const todayIdx = useMemo(() => {
    const dow = new Date().getDay();
    const idx = MENU.days.findIndex(d => d.dayOfWeek === dow);
    return idx >= 0 ? idx : 0;
  }, []);
  const [active, setActive] = useState(todayIdx);
  const day = MENU.days[active];

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight") setActive(i => (i + 1) % MENU.days.length);
      if (e.key === "ArrowLeft")  setActive(i => (i - 1 + MENU.days.length) % MENU.days.length);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);

    <${React.Fragment}>
      <div className="bg-decor">

        <div className="bg-icon s5" style=${{ color: 'var(--coral-deep)' }}><${SoupIcon} /></div>
        <div className="bg-icon s6" style=${{ color: 'var(--pistachio-deep)' }}><${AppleIcon} /></div>
        <div className="bg-icon s7" style=${{ color: 'var(--sun)' }}><${CupIcon} /></div>
        <div className="bg-icon s8" style=${{ color: 'var(--coral)' }}><${NoodleIcon} /></div>
      </div>

      <div className="window">
        <header className="window-header">
          <div className="brand">
            <div className="brand-logo"><${LogoIcon} /></div>
            <div className="brand-text">
              <div className="brand-name">TV Nova</div>
              <div className="brand-sub">Perfect Canteen</div>
            </div>
          </div>
          <div className="meta">
            <div className="week-pill">
              <${CalendarIcon} />
              <span>${MENU.weekRange}</span>
            </div>
            <div className="updated">Aktualizováno · ${MENU.updated}</div>
          </div>
        </header>

        <div className="tabs">
          ${MENU.days.map((d, i) => html`
            <button
              key=${d.id}
              className=${"tab" + (i === active ? " active" : "") + (i === todayIdx ? " is-today" : "")}
              style=${{ "--i": i }}
              onClick=${() => setActive(i)}
            >
              <span className="tab-name">${d.name}</span>
              <span className="tab-date">${d.date}</span>
            </button>
          `)}
        </div>

        <div className="body">
          <main className="today" key=${day.id}>
            ${day.sections.map((s, si) => {
              const Icon = SECTION_ICONS[s.label] || PlateIcon;
              const cls = s.label.toLowerCase();
              return html`
                <section className="section" style=${{ "--i": si }} key=${si}>
                  <div className="section-head">
                    <div className=${"section-icon " + cls}><${Icon} /></div>
                    <div className="section-title">${s.label}</div>
                    <div className="section-count">${s.items.length}</div>
                  </div>
                  <div className="items">
                    ${s.items.map((it, ii) => html`
                      <div className="item" key=${ii}>
                        <div className="name">
                          ${it.gram ? html`<span className="gram">${it.gram}</span>` : null}
                          <strong>${it.name}</strong>
                          ${it.allergens ? html`<span className="all">(${it.allergens})</span>` : null}
                        </div>
                        <div className="price">${it.price}</div>
                      </div>
                    `)}

                    ${cat.items.map((it, ii) => html`
                      <div className="item" key=${ii}>
                        <div className="name">
                          ${it.gram ? html`<span className="gram">${it.gram}</span>` : null}
                          <strong>${it.name}</strong>
                          ${it.allergens ? html`<span className="all">(${it.allergens})</span>` : null}

                        <div className="price">${it.price}</div>
                      </div>
                    `)}

              `)}

}
